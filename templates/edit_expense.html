<!DOCTYPE html>
<html>
<head>
    <title>Edit Expense</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<!-- SIDEBAR -->
<div class="sidebar">
    <h2>PocketTracker</h2>
    <a href="{{ url_for('dashboard') }}">Dashboard</a>
    <a href="{{ url_for('add_expense') }}">Add Expense</a>
</div>

<!-- MAIN CONTENT -->
<div class="main-content">
<button class="btn d-md-none mb-3" style="background:#3b82f6; color:white;" onclick="toggleMenu()">☰ Menu</button><head>
    <div class="card-box">
        <h4 class="mb-4">Edit Expense</h4>

        <form method="POST" action="{{ url_for('edit_expense', expense_id=expense_id) }}">

            <div class="mb-3">
                <label class="form-label">Expense Name</label>
                <input type="text" class="form-control dark-input" name="name"
                       value="{{ expense.name }}" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Amount</label>
                <input type="number" step="0.01" class="form-control dark-input"
                       name="amount" value="{{ expense.amount }}" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Category</label>
                <select class="form-control dark-input" name="category" required>
                    <option value="">Select a category</option>
                    <option value="Food" {% if expense.category == 'Food' %}selected{% endif %}>Food</option>
                    <option value="Transportation" {% if expense.category == 'Transportation' %}selected{% endif %}>Transportation</option>
                    <option value="Entertainment" {% if expense.category == 'Entertainment' %}selected{% endif %}>Entertainment</option>
                    <option value="Utilities" {% if expense.category == 'Utilities' %}selected{% endif %}>Utilities</option>
                </select>
            </div>

            <div class="mb-3">
                <label class="form-label">Date</label>
                <input type="date" class="form-control dark-input"
                       name="date"
                       value="{{ expense.date.strftime('%Y-%m-%d') }}"
                       required>
            </div>

            <button type="submit" class="btn btn-primary">Update Expense</button>
            <a href="{{ url_for('dashboard') }}" class="btn btn-secondary">Cancel</a>

        </form>
    </div>

</div>
<script>
function toggleMenu() {
    const sidebar = document.querySelector('.sidebar');
    sidebar.style.display =
        sidebar.style.display === 'block' ? 'none' : 'block';
}
</script>
</body>
</html>
