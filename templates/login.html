<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - PocketTrack</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body style="display: flex; align-items: center; justify-content: center; min-height: 100vh;">
    
   <div class="card-box" style="width: 400px;"> 
    <div class="t mb-4" style="display: flex; flex-direction: column; align-items: center;">
        <img src="{{ url_for('static', filename='Tracklogo.png') }}" alt="PocketTrack Logo" style="width: 180px; margin-top: 1.5px; margin-bottom: 2px;">  
        <h3 class="text-center mb-4">Welcome Back to PocketTrack</h3> 
    </div>

    {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            {% for category, message in messages %}
                <div class="alert alert-{{ 'success' if category == 'success' else 'danger' }} alert-dismissible fade show" role="alert">
                    {{ message }}
                    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                </div>
            {% endfor %}
        {% endif %}
    {% endwith %}

    {% if error %}
        <div class="alert alert-danger" role="alert">
            {{ error }}
        </div>
    {% endif %}

    <form method="POST" action="{{ url_for('Login') }}">
        <div class="mb-3">
            <label for="username">Username:</label>
            <input type="text" id="username" name="username" class="form-control dark-input" required>
        </div>
        <div class="mb-3">
            <label for="password">Password:</label>
            <input type="password" id="password" name="password" class="form-control dark-input" required>
            <a href="{{url_for('ForgotPassword')}}" id="forgot-link" class="btn btn-link w-100 mt-2">Forgot Password?</a>
        </div>
        <button type="submit" class="btn btn-primary w-100">
            Login</button>
            
        <a href="{{ url_for('register') }}" class="btn btn-link w-100 mt-2">Don't have an account? Register</a>
        
    </form>
    </div>
    
</body>
</html>
