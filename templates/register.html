<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - PocketTrack</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body style="display: flex; align-items: center; justify-content: center; min-height: 100vh;">
    
   <div class="card-box" style="width: 400px;"> 
    <h3 class="text-center mb-4">PocketTrack Registration</h3>

    {% if error %}
        <div class="alert alert-danger" role="alert">
            {{ error }}
        </div>
    {% endif %}

    <form method="POST" action="{{ url_for('register') }}">
        <div class="mb-3">
            <label for="username">Username:</label>
            <input type="text" id="username" name="username" class="form-control dark-input" required>
        </div>
        <div class="mb-3">
            <label for="password">Password:</label>
            <input type="password" id="password" name="password" class="form-control dark-input" required>
        </div>
        <button type="submit" class="btn btn-primary w-100">Register</button>
        <a href="{{ url_for('Login') }}" class="btn btn-link w-100 mt-2">Back to Login</a>

    </form>
    </div>
</html>
